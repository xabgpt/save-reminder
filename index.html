<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Save Reminder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100%;
    padding: 24px;
    -webkit-user-select: none;
    user-select: none;
  }
  .container {
    text-align: center;
    background: #16213e;
    border-radius: 20px;
    padding: 40px 32px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    width: 100%;
    max-width: 400px;
  }
  h1 {
    font-size: 1.2rem;
    margin-bottom: 28px;
    color: #a0a0c0;
    font-weight: 500;
  }
  #timer {
    font-size: 4.5rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    margin-bottom: 12px;
    color: #e0e0e0;
    letter-spacing: 2px;
  }
  #status {
    font-size: 0.95rem;
    margin-bottom: 28px;
    color: #7a7a9a;
    min-height: 1.5em;
  }
  .alert-text {
    font-size: 1.8rem;
    font-weight: 700;
    color: #ff4757;
    margin-bottom: 20px;
    min-height: 2.5rem;
  }
  .alert-text.blink {
    animation: blink 0.5s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  .buttons { display: flex; gap: 12px; justify-content: center; }
  button {
    font-size: 1.1rem;
    padding: 14px 32px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: scale(0.95); }
  #startBtn { background: #0abf53; color: #fff; }
  #okBtn { background: #3498db; color: #fff; display: none; flex: 1; font-size: 1.3rem; padding: 18px; }
  #stopBtn { background: #e74c3c; color: #fff; display: none; }
  .cycle-count {
    margin-top: 20px;
    font-size: 0.85rem;
    color: #555;
  }

  /* Fullscreen alert overlay */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.95);
    z-index: 100;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 32px;
    padding: 32px;
  }
  #overlay.active { display: flex; }
  #overlay .alert-text { font-size: 2.4rem; }
  #overlay button {
    font-size: 1.5rem;
    padding: 20px 64px;
    border-radius: 16px;
    background: #3498db;
    color: #fff;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Save Work Reminder</h1>
  <div id="timer">05:00</div>
  <div id="status">Press Start to begin</div>
  <div id="alertTextSmall" class="alert-text"></div>
  <div class="buttons">
    <button id="startBtn">Start</button>
    <button id="okBtn">OK - Saved!</button>
    <button id="stopBtn">Stop</button>
  </div>
  <div id="cycleCount" class="cycle-count"></div>
</div>

<!-- Fullscreen overlay for alarm state -->
<div id="overlay">
  <div class="alert-text blink">SAVE YOUR WORK!</div>
  <button id="overlayOk">OK - Saved!</button>
</div>

<script>
  const INTERVAL = 5 * 60;
  const timerEl = document.getElementById('timer');
  const statusEl = document.getElementById('status');
  const alertTextSmall = document.getElementById('alertTextSmall');
  const startBtn = document.getElementById('startBtn');
  const okBtn = document.getElementById('okBtn');
  const stopBtn = document.getElementById('stopBtn');
  const overlay = document.getElementById('overlay');
  const overlayOk = document.getElementById('overlayOk');
  const cycleCountEl = document.getElementById('cycleCount');

  let remaining = INTERVAL;
  let tickId = null;
  let wakeLock = null;
  let cycles = 0;
  let alarmPlaying = false;
  let alarmLoopId = null;

  // Generate a WAV alarm tone as a data URL (works reliably on mobile)
  function generateAlarmWav() {
    const sampleRate = 22050;
    const duration = 1.2; // seconds
    const numSamples = Math.floor(sampleRate * duration);
    const buffer = new ArrayBuffer(44 + numSamples * 2);
    const view = new DataView(buffer);

    // WAV header
    const writeStr = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };
    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + numSamples * 2, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeStr(36, 'data');
    view.setUint32(40, numSamples * 2, true);

    // Generate alternating tones: 880Hz and 660Hz, switching every 0.3s
    for (let i = 0; i < numSamples; i++) {
      const t = i / sampleRate;
      const freq = (Math.floor(t / 0.3) % 2 === 0) ? 880 : 660;
      const sample = Math.sin(2 * Math.PI * freq * t) * 0.4;
      view.setInt16(44 + i * 2, sample * 32767, true);
    }

    const blob = new Blob([buffer], { type: 'audio/wav' });
    return URL.createObjectURL(blob);
  }

  const alarmUrl = generateAlarmWav();
  const alarmAudio = new Audio(alarmUrl);
  alarmAudio.loop = true;
  // Preload
  alarmAudio.load();

  function fmt(s) {
    const m = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return `${m}:${sec}`;
  }

  // Keep screen awake on mobile
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (e) { /* not supported or denied */ }
  }

  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && tickId) requestWakeLock();
  });

  // Unlock audio on iOS by playing a silent moment on user tap
  function unlockAudio() {
    alarmAudio.muted = true;
    alarmAudio.play().then(() => {
      alarmAudio.pause();
      alarmAudio.muted = false;
      alarmAudio.currentTime = 0;
    }).catch(() => {});
  }

  function startAlarm() {
    alarmPlaying = true;
    alarmAudio.currentTime = 0;
    alarmAudio.play().catch(() => {});

    // Vibrate on Android
    if (navigator.vibrate) {
      alarmLoopId = setInterval(() => navigator.vibrate([200, 100, 200]), 600);
      navigator.vibrate([200, 100, 200]);
    }
  }

  function stopAlarm() {
    alarmPlaying = false;
    alarmAudio.pause();
    alarmAudio.currentTime = 0;
    if (alarmLoopId) { clearInterval(alarmLoopId); alarmLoopId = null; }
    if (navigator.vibrate) navigator.vibrate(0);
  }

  function tick() {
    remaining--;
    timerEl.textContent = fmt(remaining);
    if (remaining <= 0) {
      clearInterval(tickId);
      tickId = null;
      triggerAlert();
    }
  }

  function triggerAlert() {
    timerEl.textContent = '00:00';
    statusEl.textContent = 'Time to save!';
    alertTextSmall.textContent = 'SAVE YOUR WORK!';
    alertTextSmall.classList.add('blink');
    document.title = '!! SAVE YOUR WORK !!';
    overlay.classList.add('active');
    startAlarm();
    okBtn.style.display = 'block';
  }

  function dismissAlert() {
    stopAlarm();
    overlay.classList.remove('active');
    alertTextSmall.textContent = '';
    alertTextSmall.classList.remove('blink');
    document.title = 'Save Reminder';
    okBtn.style.display = 'none';
    cycles++;
    cycleCountEl.textContent = `Saves reminded: ${cycles}`;
    remaining = INTERVAL;
    timerEl.textContent = fmt(remaining);
    statusEl.textContent = 'Running \u2014 next reminder in 5 min';
    tickId = setInterval(tick, 1000);
  }

  startBtn.addEventListener('click', () => {
    unlockAudio(); // critical: unlock audio on user tap for iOS
    startBtn.style.display = 'none';
    stopBtn.style.display = 'inline-block';
    remaining = INTERVAL;
    timerEl.textContent = fmt(remaining);
    statusEl.textContent = 'Running \u2014 next reminder in 5 min';
    tickId = setInterval(tick, 1000);
    requestWakeLock();
  });

  okBtn.addEventListener('click', dismissAlert);
  overlayOk.addEventListener('click', dismissAlert);

  stopBtn.addEventListener('click', () => {
    clearInterval(tickId);
    tickId = null;
    stopAlarm();
    overlay.classList.remove('active');
    alertTextSmall.textContent = '';
    alertTextSmall.classList.remove('blink');
    document.title = 'Save Reminder';
    remaining = INTERVAL;
    timerEl.textContent = fmt(remaining);
    statusEl.textContent = 'Stopped. Press Start to begin again.';
    startBtn.style.display = 'inline-block';
    stopBtn.style.display = 'none';
    okBtn.style.display = 'none';
    releaseWakeLock();
  });

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
